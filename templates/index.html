{% extends 'base.html' %}

{% block title %}
Formulario
{% endblock %}

{% block content %}
<h2>Formulario de registro</h2>

{% if errores %}
<ul>
    {% for error in errores %}
    <li>{{ error }}</li>
    {% endfor %}
</ul>
{% endif %}

<form method="POST">
    Nombre:
    <input type="text" name="nombre" value="{{ nombre or '' }}"><br>

    Email:
    <input type="email" name="email" value="{{ email or '' }}"><br>

    <input type="submit" value="Enviar">
</form>
{% endblock %}
